<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horários</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../../assets/img/android-logo-png-transparent.png">

</head>

<body>

    <header class="header">
        <img src="../../assets/img/Android ferramento.png" alt="Logo" class="header-logo">
        <div class="header-info">
            <div class="header-title">Computex Lite</div>
            <div class="header-sub">Grade de Horários</div>
        </div>
        <button class="logout-btn" title="Sair" onclick="window.location.href='../dashboard/index.html';">
            <img src="../../assets/img/icons/sair.jpg" alt="Sair" />
        </button>
    </header>

    <!--barra de infos-->
    <div class="summary-bar">
        <div class="summary-chip">
            <span class="chip-value">8</span>
            <span class="chip-label">Aulas</span>
        </div>
        <div class="summary-chip">
            <span class="chip-value">Manhã</span>
            <span class="chip-label">Período</span>
        </div>
    </div>

    <!-- linha do tempo das aulas -->
    <main class="timeline">
        <div class="aula-card">
            <div class="time-col">

                <!--portugues-->
                <span class="time-start">07:20</span>
                <span class="time-end">08:00</span>
            </div>
            <div class="info-card theme-portugues">
                <div class="subject-name">Português</div>
                <div class="subject-details">Prof. Rogrigo</div>
            </div>
        </div>

        <!--literatura-->
        <div class="aula-card">
            <div class="time-col">
                <span class="time-start">08:00</span>
                <span class="time-end">08:40</span>
            </div>
            <div class="info-card theme-literatura">
                <div class="subject-name">Literatura</div>
                <div class="subject-details">Prof. Ana</div>
            </div>
        </div>

        <!--intervalo-->
        <div class="intervalo">
            <span>Intervalo — 09:20 às 10:00</span>
        </div>

        <!--história-->
        <div class="aula-card">
            <div class="time-col">
                <span class="time-start">10:00</span>
                <span class="time-end">10:40</span>
            </div>
            <div class="info-card theme-historia">
                <div class="subject-name">História</div>
                <div class="subject-details">Prof. Dannyel — Sala 12</div>
            </div>
        </div>

        <!--ed. fisica-->
        <div class="aula-card">
            <div class="time-col">
                <span class="time-start">12:00</span>
                <span class="time-end">12:40</span>
            </div>
            <div class="info-card theme-ed-fisica">
                <div class="subject-name">Ed. Física</div>
                <div class="subject-details">Prof. Carlos — Quadra</div>
            </div>
        </div>
    </main>

</body>

</html>
